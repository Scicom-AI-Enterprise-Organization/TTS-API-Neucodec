services:
  tts-engine:
    build:
      context: .
      dockerfile: Dockerfile_vllm
    ipc: host
    shm_size: 10.24gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    container_name: tts-engine
    command:
      - vllm
      - serve
      - ${STT_MODEL:-Scicom-intl/Multilingual-TTS-1.7B-Base}
      - --dtype 
      - bfloat16
      - --port
      - "9093"
      - --gpu-memory-utilization 
      - ${GPU_MEM_UTIL:-0.7}
      - --max-model-len
      - "4096"
      - --served-model-name 
      - TTS-model
    volumes:
      - "~/.cache/huggingface:/root/.cache/huggingface"
    ports:
      - "9093:9093"
    networks: ["tts-network"]

networks:
  tts-network:
    external: true